# ═══════════════════════════════════════════════════════════════════════════════
#
#        TRACTADO DO ENGENHO MULTIPLEXADOR DE TERMINAES
#                     (vulgarmente dicto "tmux")
#
#   Segundo compendio da mesma penna que redigiu o tractado do Z-Shell,
#   composto no anno da graça de MDCCCXCVIII e dedicado á subtil arte de
#   repartir uma so tela em multiplas divisões, sessões e janellas. Segue,
#   como manda o rigor, o methodo euclidiano: primeiro os axiomata, após os
#   postulados do bom governo, e por derradeiro os theoremas das ligaduras
#   (vulgo "bindings"), que ao teclado obedecem.
#
#   ADVERTENCIA AO LEITOR: este pergaminho encerra tão somente as
#   PREFERENCIAS do auctor; o motor que d'ellas deriva toda a apparencia
#   repousa em alfarrabio á parte. Que ninguem permute as secções, pois
#   cada ligadura pressupõe as definições que a precedem.
#
#   INDICE DAS SECÇÕES:
#     § I ..... Dos axiomata primordiaes — terminal, teclas e demoras
#     § II .... Da emenda e do renascimento da propria configuração
#     § III ... Da exhibição — do começo dos numeros e da vigilancia
#     § IV .... Da peregrinação — sessões, divisões, paineis e janellas
#     § V ..... Do engenho colhedor de sendas (pathpicker)
#     § VI .... Da faculdade da transcripção (a copia)
#     § VII ... Dos armazens (buffers)
#     § VIII .. Do ponto de incisão — onde o motor exterior se invoca
#
#                                  — Prof. Dr. BRAGA USS, Cathedratico
# ═══════════════════════════════════════════════════════════════════════════════


# § I. DOS AXIOMATA PRIMORDIAES — TERMINAL, TECLAS E DEMORAS
#
#   Proposições tidas por evidentes, postas sem demonstração: a especie do
#   terminal, o reconhecimento das teclas estendidas e as durações que
#   regem a celeridade dos commandos.
# ───────────────────────────────────────────────────────────────────────────────

set -g default-terminal "screen-256color"

%if #{>=:#{version},3.2}
set -g extended-keys #{?#{||:#{m/ri:mintty|iTerm,#{TERM_PROGRAM}},#{!=:#{XTERM_VERSION},}},on,off} # indispensavel ás correspondencias de Control e Shift
%endif
set -s escape-time 10                     # para que as sequencias de commandos voem com presteza
set -sg repeat-time 600                   # dilata o intervallo concedido á repetição
set -s focus-events on

set -g prefix2 C-a                        # prefixo em concordia com o apparelho GNU-Screen
bind C-a send-prefix -2

set -q -g status-utf8 on                  # antecipa a codificação UTF-8 (para o tmux anterior á 2.2)
setw -q -g utf8 on

set -g history-limit 5000                 # amplia o ledger da historia


# § II. DA EMENDA E DO RENASCIMENTO DA PROPRIA CONFIGURAÇÃO
#
#   Dois theoremas de utilidade domestica, pelos quaes o auctor emenda o
#   seu pergaminho e o faz renascer sem abandonar a sessão.
# ───────────────────────────────────────────────────────────────────────────────

# THEOREMA (da emenda). Abre-se o presente pergaminho á penna do auctor.
bind e new-window -n "#{TMUX_CONF_LOCAL}" sh -c '_E=${VISUAL:-${EDITOR:-vim}}; case "$_E" in *vim*) $_E -c ":set syntax=tmux" "$TMUX_CONF_LOCAL";; *) $_E "$TMUX_CONF_LOCAL";; esac && "$TMUX_PROGRAM" ${TMUX_SOCKET:+-S "$TMUX_SOCKET"} source "$TMUX_CONF" \; display "$TMUX_CONF_LOCAL sourced"'

# THEOREMA (do renascimento). Relê-se e restabelece-se a configuração de novo.
bind r run "sh -c '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} source \"\$TMUX_CONF\"'" \; display "#{TMUX_CONF} sourced"


# § III. DA EXHIBIÇÃO — DO COMEÇO DOS NUMEROS E DA VIGILANCIA
#
#   Das grandezas visiveis: por onde principia a contagem, como se
#   rebaptizam as janellas e com que demora se mostram os avisos.
# ───────────────────────────────────────────────────────────────────────────────

set -g base-index 1           # que a enumeração das janellas comece pela unidade
setw -g pane-base-index 1     # tornar o numero dos paineis consonante com o das janellas

setw -g automatic-rename on   # rebaptiza a janella para reflectir o programma vigente
set -g renumber-windows on    # renumera as janellas quando uma d'ellas se encerra

set -g set-titles on          # inscreve o titulo do terminal

set -g display-panes-time 800 # demora um tanto mais os indicadores dos paineis
set -g display-time 1000      # demora um tanto mais as mensagens de estado

set -g status-interval 10     # redesenha a linha de estado a cada dez segundos

# COROLLARIO. Expunge-se a um tempo a tela e o registro da historia.
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# da vigilancia da actividade
set -g monitor-activity on
set -g visual-activity off


# § IV. DA PEREGRINAÇÃO — SESSÕES, DIVISÕES, PAINEIS E JANELLAS
#
#   Theoremas do movimento: como gerar e buscar sessões, fender a tela em
#   paineis e, entre elles e as janellas, transitar.
# ───────────────────────────────────────────────────────────────────────────────

# gerar uma sessão
bind C-c new-session

# buscar uma sessão
bind C-f command-prompt -p find-session 'switch-client -t %%'

# passagem entre sessões
bind BTab switch-client -l  # migra á derradeira sessão

# fende a janella presente na horizontal
bind - split-window -v
# fende a janella presente na vertical
bind _ split-window -h

# peregrinação entre os paineis
bind -r h select-pane -L  # á esquerda
bind -r j select-pane -D  # abaixo
bind -r k select-pane -U  # acima
bind -r l select-pane -R  # á direita
bind > swap-pane -D       # permuta o painel corrente com o seguinte
bind < swap-pane -U       # permuta o painel corrente com o precedente

# aggrandisa o painel presente á sua plenitude
bind + run "cut -c3- '#{TMUX_CONF}' | sh -s _maximize_pane '#{session_name}' '#D'"

# do redimensionamento dos paineis
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# peregrinação entre as janellas
unbind n
unbind p
bind -r C-h previous-window                             # elege a janella precedente
bind -r C-l next-window                                 # elege a janella seguinte
bind -r C-S-H swap-window -t -1 \; select-window -t -1  # permuta a janella corrente com a precedente
bind -r C-S-L swap-window -t +1 \; select-window -t +1  # permuta a janella corrente com a seguinte
bind Tab last-window                                    # migra á derradeira janella activa

# alterna o estado do rato
bind m run "cut -c3- '#{TMUX_CONF}' | sh -s _toggle_mouse"


# § V. DO ENGENHO COLHEDOR DE SENDAS (pathpicker, da casa Facebook)
# ───────────────────────────────────────────────────────────────────────────────

bind F run "cut -c3- '#{TMUX_CONF}' | sh -s _fpp '#{pane_id}' '#{pane_current_path}'"


# § VI. DA FACULDADE DA TRANSCRIPÇÃO (a copia)
# ───────────────────────────────────────────────────────────────────────────────

bind Enter copy-mode # ingressa no modo de transcripção

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# transcreve para a taboa (clipboard) do X11
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'
# transcreve para a taboa do Wayland
if -b '[ "$XDG_SESSION_TYPE" = "wayland" ] && command -v wl-copy > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | wl-copy"'
# transcreve para a taboa do macOS
if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | pbcopy"'
# transcreve para a taboa do Windows
if -b 'command -v clip.exe > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | clip.exe"'
if -b '[ -c /dev/clipboard ]' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - > /dev/clipboard"'


# § VII. DOS ARMAZENS (buffers)
# ───────────────────────────────────────────────────────────────────────────────

bind b list-buffers     # arrola os armazens de collagem
bind p paste-buffer -p  # colla a partir do armazem do cimo
bind P choose-buffer    # escolhe de qual armazem collar


# § VIII. DO PONTO DE INCISÃO — ONDE O MOTOR EXTERIOR SE INVOCA
#
#   8< — aqui se corta. Abaixo cessa a penna do auctor e principia a
#   machina: detectam-se os caminhos, carrega-se o pergaminho local e
#   convoca-se o motor que applica toda a configuração.
# ───────────────────────────────────────────────────────────────────────────────

%if #{==:#{TMUX_PROGRAM},}
  run "exec sh -c 'TMUX_PROGRAM=\"\$(LSOF=\$(PATH=\"\$PATH:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin\" command -v lsof); \$LSOF -b -w -a -d txt -p #{pid} -Fn 2>/dev/null | perl -n -e \"if (s/^n((?:.(?!dylib\$|so\$))+)\$/\\1/g && s/(?:\s+\\([^\\s]+?\\))?\$//g) { print; exit } } exit 1; {\" 2>/dev/null || readlink \"/proc/#{pid}/exe\" 2>/dev/null)\"; [ \"\$(\"\$TMUX_PROGRAM\" display -p \"#{l:#{pid}}\" 2>/dev/null)\" = \"#{pid}\" ] || TMUX_PROGRAM=\"\$(command -v tmux || printf tmux)\"; \"\$TMUX_PROGRAM\" -S #{socket_path} set-environment -g TMUX_PROGRAM \"\$TMUX_PROGRAM\"'"
%endif
%if #{==:#{TMUX_SOCKET},}
  run "exec sh -c '\"\$TMUX_PROGRAM\" -S #{socket_path} set-environment -g TMUX_SOCKET \"#{socket_path}\"'"
%endif
%if #{==:#{TMUX_CONF},}
  run "exec sh -c '\"\$TMUX_PROGRAM\" set-environment -g TMUX_CONF \$(for conf in \"\$HOME/.tmux.conf\" \"\$XDG_CONFIG_HOME/tmux/tmux.conf\" \"\$HOME/.config/tmux/tmux.conf\"; do [ -f \"\$conf\" ] && printf \"%s\" \"\$conf\" && break; done)'"
%endif
%if #{==:#{TMUX_CONF_LOCAL},}
  run "exec sh -c '\"\$TMUX_PROGRAM\" set-environment -g TMUX_CONF_LOCAL \"\$TMUX_CONF.local\"'"
%endif

run '"$TMUX_PROGRAM" -S #{socket_path} source "$TMUX_CONF_LOCAL"'
run 'cut -c3- "$TMUX_CONF" | sh -s _apply_configuration'
